name: Run procedure pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    environment: openai
    env:
      API_KEY: ${{ secrets.API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pipeline
        run: python run_procedure_pipeline.py --require-api-key

      - name: Upload pipeline outputs
        uses: actions/upload-artifact@v4
        with:
          name: procedure-pipeline-outputs
          path: outputs/procedure_pipeline/
